---
cluster:
  provider:
    oxide: Oxide
  cloudCredential:
    oxide:
      host:
        label: Host
        placeholder: "https://oxide.sys.example.com"
      token:
        label: API Token
        placeholder: "oxide-token-abc123"
  machineConfig:
    oxide:
      project:
        label: Project
        placeholder: Project name or ID
      bootDiskImageId:
        label: Boot Disk Image ID
        placeholder: Image ID for the boot disk
      vcpus:
        label: vCPUs
      memory:
        label: Memory
        placeholder: "4 GiB"
      bootDiskSize:
        label: Boot Disk Size
        placeholder: "20 GiB"
      vpc:
        label: VPC
      subnet:
        label: Subnet
      ephemeralIpAttach:
        label: Attach Ephemeral IP
      ephemeralIpPool:
        label: IP Pool
        placeholder: IP pool name or ID (optional)
      sshUser:
        label: SSH User
      userDataFile:
        label: User Data File
        placeholder: Path to cloud-init user data file
